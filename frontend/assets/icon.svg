<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="softshadow">
      <feDropShadow dx="8" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Left: shaded/cool side -->
  <polygon points="0,0 600,0 490,1024 0,1024" fill="#1B5E20"/>
  <!-- Right: sunny/warm side -->
  <polygon points="600,0 1024,0 1024,1024 490,1024" fill="#E65100"/>

  <!-- Sun (upper right, warm side) -->
  <circle cx="820" cy="195" r="155" fill="#FFD600" filter="url(#softshadow)"/>
  <!-- Sun rays -->
  <g fill="#FFD600" opacity="0.6">
    <rect x="806" y="10"  width="28" height="90" rx="14" transform="rotate(0   820 195)"/>
    <rect x="806" y="10"  width="28" height="90" rx="14" transform="rotate(45  820 195)"/>
    <rect x="806" y="10"  width="28" height="90" rx="14" transform="rotate(90  820 195)"/>
    <rect x="806" y="10"  width="28" height="90" rx="14" transform="rotate(135 820 195)"/>
    <rect x="806" y="10"  width="28" height="90" rx="14" transform="rotate(180 820 195)"/>
    <rect x="806" y="10"  width="28" height="90" rx="14" transform="rotate(225 820 195)"/>
    <rect x="806" y="10"  width="28" height="90" rx="14" transform="rotate(270 820 195)"/>
    <rect x="806" y="10"  width="28" height="90" rx="14" transform="rotate(315 820 195)"/>
  </g>

  <!-- Ground shadow (cast by sun on the right, going left) -->
  <ellipse cx="400" cy="875" rx="230" ry="42" fill="#000" opacity="0.25"/>

  <!-- Walking figure (white silhouette, striding left into shade) -->
  <g fill="white" filter="url(#softshadow)">
    <!-- Head -->
    <circle cx="490" cy="185" r="76"/>

    <!-- Torso (slightly forward-leaning) -->
    <path d="M430,275 Q490,258 550,275 L540,530 L440,530 Z"/>

    <!-- Left arm — swinging back (behind body, on the right) -->
    <path d="M540,310 L630,460 L598,480 L508,330 Z" rx="20"/>

    <!-- Right arm — swinging forward (in front, on the left) -->
    <path d="M440,305 L340,430 L312,408 L412,283 Z"/>

    <!-- Right leg — striding forward (toward shade, on the left) -->
    <path d="M445,524 L355,710 L355,785 L410,785 L490,600 L490,524 Z"/>

    <!-- Left leg — pushing back (on the right/behind) -->
    <path d="M490,524 L540,524 L600,710 L600,780 L555,780 L485,600 Z"/>
  </g>
</svg>
