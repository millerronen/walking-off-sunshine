<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </radialGradient>
    <radialGradient id="leafGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Sun rays -->
  <g fill="#FFD54F" opacity="0.7" transform="translate(620, 420)">
    <rect x="-14" y="-340" width="28" height="100" rx="14"/>
    <rect x="-14" y="-340" width="28" height="100" rx="14" transform="rotate(45)"/>
    <rect x="-14" y="-340" width="28" height="100" rx="14" transform="rotate(90)"/>
    <rect x="-14" y="-340" width="28" height="100" rx="14" transform="rotate(135)"/>
    <rect x="-14" y="-340" width="28" height="100" rx="14" transform="rotate(180)"/>
    <rect x="-14" y="-340" width="28" height="100" rx="14" transform="rotate(225)"/>
    <rect x="-14" y="-340" width="28" height="100" rx="14" transform="rotate(270)"/>
    <rect x="-14" y="-340" width="28" height="100" rx="14" transform="rotate(315)"/>
  </g>

  <!-- Sun circle -->
  <circle cx="620" cy="420" r="210" fill="url(#sunGrad)" filter="url(#shadow)"/>

  <!-- Large leaf overlapping sun from bottom-left -->
  <g filter="url(#shadow)">
    <!-- Leaf shape: tall oval pointed at both ends, tilted -->
    <ellipse cx="390" cy="560" rx="210" ry="340"
      transform="rotate(-35 390 560)"
      fill="url(#leafGrad)"/>
    <!-- Leaf highlight -->
    <ellipse cx="360" cy="500" rx="70" ry="160"
      transform="rotate(-35 360 500)"
      fill="#A5D6A7" opacity="0.25"/>
    <!-- Main vein -->
    <line x1="260" y1="740" x2="510" y2="370"
      stroke="#1B5E20" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
    <!-- Side veins -->
    <line x1="350" y1="620" x2="220" y2="570" stroke="#1B5E20" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="380" y1="570" x2="250" y2="500" stroke="#1B5E20" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="420" y1="510" x2="300" y2="440" stroke="#1B5E20" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <line x1="450" y1="455" x2="340" y2="385" stroke="#1B5E20" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
